<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#12100d" />
    <title>404 | EPUB Chapters Studio</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=IBM+Plex+Mono:wght@500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap");

      :root {
        color: #f4efe4;
        background: #12100d;
        font-family: "Source Serif 4", Georgia, serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          radial-gradient(circle at 70% 45%, rgba(44, 146, 129, 0.24), transparent 28%),
          #12100d;
        background-size: 100% 5px, auto, auto;
      }

      main {
        width: min(860px, calc(100vw - 48px));
        padding: 56px 0;
        text-align: center;
      }

      p {
        margin: 0 0 16px;
        color: #d8a84c;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Fraunces", Georgia, serif;
        font-size: clamp(44px, 10vw, 104px);
        line-height: 0.9;
        letter-spacing: 0;
      }

      a {
        display: inline-block;
        margin-top: 32px;
        border: 1px solid rgba(244, 239, 228, 0.34);
        color: #f4efe4;
        padding: 12px 16px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        text-transform: uppercase;
        transition: border-color 160ms ease, color 160ms ease, transform 160ms ease;
      }

      a:hover,
      a:focus-visible {
        border-color: #d8a84c;
        color: #d8a84c;
        transform: translateY(-1px);
      }

      a:focus-visible {
        outline: 2px solid #d8a84c;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <p>404</p>
      <h1>That production reel is not in this session.</h1>
      <a href="/">Return to the studio</a>
    </main>
  </body>
</html>
